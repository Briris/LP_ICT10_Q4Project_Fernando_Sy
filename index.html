function ShowClassmates() {
    let classmates = "";
    for (const [username, [section, fav_subject]] of Object.entries(takenuser)) {
        classmates += `${username}: \nSection: ${section} \nFavorite Subject: ${fav_subject}\n\n`;
    }
    document.getElementById("classmate-list").innerText = classmates;
}

function AddClassmate() {
    const username = document.getElementById("username").value.trim();
    const section = document.getElementById("section").value.trim();
    const fav_subject = document.getElementById("subject").value.trim();

    if (!username || !section || !fav_subject) {
        document.getElementById("signed").innerText = "Please fill in all fields.";
        return;
    }

    if (takenuser[username]) {
        document.getElementById("signed").innerText = "This classmate already exists.";
        return;
    }

    takenuser[username] = [section, fav_subject];
    document.getElementById("signed").innerText = `${username} added as a classmate!`;
    document.getElementById("username").value = "";
    document.getElementById("section").value = "";
    document.getElementById("subject").value = "";
}
